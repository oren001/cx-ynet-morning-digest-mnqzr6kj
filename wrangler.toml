```toml
name = "ynet-morning-digest"
main = "index.js"
compatibility_date = "2024-01-10"

[observability]
enabled = true

[[kv_namespaces]]
binding = "USER_PREFERENCES"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000001"

[[kv_namespaces]]
binding = "READING_HISTORY"
id = "00000000000000000000000000000002"
preview_id = "00000000000000000000000000000003"

[[kv_namespaces]]
binding = "DIGEST_METADATA"
id = "00000000000000000000000000000004"
preview_id = "00000000000000000000000000000005"

[triggers]
crons = ["0 3 * * *"]

[build]
command = ""

[env.production]
name = "ynet-morning-digest-production"
vars = { ENVIRONMENT = "production" }

[[env.production.kv_namespaces]]
binding = "USER_PREFERENCES"
id = "00000000000000000000000000000000"

[[env.production.kv_namespaces]]
binding = "READING_HISTORY"
id = "00000000000000000000000000000002"

[[env.production.kv_namespaces]]
binding = "DIGEST_METADATA"
id = "00000000000000000000000000000004"

[env.production.triggers]
crons = ["0 3 * * *"]

[env.development]
name = "ynet-morning-digest-dev"
vars = { ENVIRONMENT = "development" }

[[env.development.kv_namespaces]]
binding = "USER_PREFERENCES"
preview_id = "00000000000000000000000000000001"

[[env.development.kv_namespaces]]
binding = "READING_HISTORY"
preview_id = "00000000000000000000000000000003"

[[env.development.kv_namespaces]]
binding = "DIGEST_METADATA"
preview_id = "00000000000000000000000000000005"
```